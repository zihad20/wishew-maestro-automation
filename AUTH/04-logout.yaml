appId: ${MAESTRO_APP_ID}
name: "AUTH - Logout"
tags: [auth, logout]
---
- runFlow: ../shared/launch-and-login.yaml
- tapOn:
    id: "tab-profile"

- assertVisible: "My profile"

- tapOn:
    id: "profile-more-actions"
- tapOn:
    id: "profile-actions-settings"
- tapOn:
    id: "settings-logout"
- assertVisible:
    id: "login-email"
- assertVisible:
    id: "login-password"
- assertVisible:
    id: "login-submit"


