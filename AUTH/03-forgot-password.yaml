appId: ${MAESTRO_APP_ID}
name: "AUTH - Forgot Password"
tags: [auth, forgot-password]
---
- launchApp:
    clearState: false
    permissions:
      all: allow

- repeat:
    while:
      visible:
        id: "welcome-close"
    commands:
      - tapOn:
          id: "welcome-close"

- tapOn: "Forgot password?"
- assertVisible: "Forgot password?"
- assertVisible: "Enter your email and we'll send you a 6-digit code to reset your password."
- assertVisible:
    id: "forgot-password-submit"

- tapOn:
    id: "forgot-password-email"
- inputText: ${TEST_EMAIL}
- pressKey: Enter

- tapOn:
    id: "forgot-password-submit"

- assertVisible: "Reset password"

- assertVisible:
    id: "reset-password-submit"
- assertVisible:
    id: "reset-password-try-another"

- tapOn:
    id: "reset-password-submit"

- assertVisible: "Code must be 6 digits."

- tapOn: "Try another email"
- assertVisible:
    id: "forgot-password-submit"
- tapOn:
    id: "screen-header-back"
- assertVisible: "Sign in to continue\nyour journey"


