appId: ${MAESTRO_APP_ID}
name: "WISHES - Donation Drawer"
tags: [wishes, donate, drawer]
---
- runFlow: ../shared/launch-and-login.yaml

- tapOn:
    id: "tab-wishes"

- assertVisible: "Wishes For You"
- assertVisible: "Near You"
- assertVisible: "Popular"
- assertVisible: "Just Started"


