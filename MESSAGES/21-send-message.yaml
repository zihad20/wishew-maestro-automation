# Test: Search conversations in the messages inbox.
# Verifies the user can navigate to Messages, activate the search,
# type a query, and see a filtered result or empty-state indicator.
#
# IDs to replace:
#   TODO_ID_messages_tab               — bottom-nav or tab item for Messages / Inbox
#   TODO_ID_messages_search_button     — search icon / "Search" button inside messages screen
#   TODO_ID_conversations_search_field — search TextInput inside message list
#   TODO_ID_conversations_list         — list that renders filtered conversations

appId: ${MAESTRO_APP_ID}
name: "MESSAGES - Conversation Search and Message Sending Flow"
tags: [messages, search]
---
- runFlow: ../shared/launch-and-login.yaml

- tapOn:
    id: "nav-messages"

- tapOn:
    id: "messages-search"
- inputText: "Mastro"
- pressKey: Enter

- tapOn: "Mastro Message. "

- evalScript: ${output.chatMessage = "Automation test message " + Math.random().toString(36).substring(2, 10)}

- tapOn:
    id: "chat-message-input"

- inputText: ${output.chatMessage}

- tapOn:
    id: "chat-send"
- waitForAnimationToEnd
- assertVisible: ${output.chatMessage}
