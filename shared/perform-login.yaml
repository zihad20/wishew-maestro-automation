appId: ${MAESTRO_APP_ID}
name: Perform login (shared)
---

- extendedWaitUntil:
    visible:
      id: "welcome-close"
    timeout: 15000

- repeat:
    while:
      visible:
        id: "welcome-close"
    commands:
      - tapOn:
          id: "welcome-close"

    #   - waitForAnimationToEnd
# - repeat:
#     while:
#       notVisible:
#         id: "login-email"
#     commands:
#       - tapOn:
#           id: "welcome-next"

    #   - waitForAnimationToEnd

# - extendedWaitUntil:
#     visible:
#       id: "login-email"
#     timeout: 15000

- tapOn:
    id: "login-email"
- inputText: ${TEST_EMAIL}

- tapOn:
    id: "login-password"
- inputText: ${TEST_PASSWORD}
- pressKey: Enter

- tapOn:
    id: "login-submit"


- extendedWaitUntil:
    visible: "Home"
